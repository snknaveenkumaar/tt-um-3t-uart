yaml_version: 6

project:
  title: "UART Smart I/O Hub"
  author: "NAVEEN KUMAAR S"
  description: "UART-controlled 64-channel PWM hub with status page, banked outputs, and internal modulation."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x2"
  top_module: "tt_um_snk_smart_io_hub"
  source_files:
    - src/uart_rx.v
    - src/pwm_bank.v
    - src/tt_um_snk_smart_io_hub.v

pinout:
  ui[0]: "UART RX"
  ui[1]: "Command enable"
  ui[2]: "Sequencer enable"
  ui[3]: "Clear"
  ui[4]: "PWM bank select bit 0"
  ui[5]: "PWM bank select bit 1"
  ui[6]: "PWM bank select bit 2"
  ui[7]: "Status page select"

  uo[0]: "PWM bank output 0"
  uo[1]: "PWM bank output 1"
  uo[2]: "PWM bank output 2"
  uo[3]: "PWM bank output 3"
  uo[4]: "PWM bank output 4"
  uo[5]: "PWM bank output 5"
  uo[6]: "PWM bank output 6"
  uo[7]: "PWM bank output 7"

  uio[0]: "Next PWM bank output 0 / status bit 0"
  uio[1]: "Next PWM bank output 1 / status bit 1"
  uio[2]: "Next PWM bank output 2 / status bit 2"
  uio[3]: "Next PWM bank output 3 / status bit 3"
  uio[4]: "Next PWM bank output 4 / status bit 4"
  uio[5]: "Next PWM bank output 5 / status bit 5"
  uio[6]: "Next PWM bank output 6 / status bit 6"
  uio[7]: "Next PWM bank output 7 / status bit 7"

tags:
  - uart
  - pwm
  - sequencer
  - verilog
