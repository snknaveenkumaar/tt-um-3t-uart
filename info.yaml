yaml_version: 6

project:
  title: "UART Smart I/O Hub"
  author: "NAVEEN KUMAAR S"
  description: "UART-controlled 16-channel PWM hub with timers and sequencer"
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x2"

  top_module: "tt_um_snk_smart_io_hub"

  source_files:
    - src/uart_rx.v
    - src/pwm_bank.v
    - src/timer_bank.v
    - src/tt_um_snk_smart_io_hub.v

pinout:
  ui[0]: "UART RX"
  ui[1]: "Enable"
  ui[2]: "Seq Gate"
  ui[3]: "Clear"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "PWM0"
  uo[1]: "PWM1"
  uo[2]: "PWM2"
  uo[3]: "PWM3"
  uo[4]: "PWM4"
  uo[5]: "PWM5"
  uo[6]: "PWM6"
  uo[7]: "PWM7"

  uio[0]: "PWM8"
  uio[1]: "PWM9"
  uio[2]: "PWM10"
  uio[3]: "PWM11"
  uio[4]: "PWM12"
  uio[5]: "PWM13"
  uio[6]: "PWM14"
  uio[7]: "PWM15"

tags:
  - uart
  - pwm
  - timer
